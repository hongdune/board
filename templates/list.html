<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f8; color: #222; }

    .container { max-width: 780px; margin: 48px auto; padding: 0 16px; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-header h1 { font-size: 1.5rem; font-weight: 700; }

    .btn-new {
      padding: 8px 18px; background: #4a90e2; color: #fff;
      border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer;
      text-decoration: none;
    }
    .btn-new:hover { background: #357abd; }

    .post-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .post-table thead { background: #f0f2f5; }
    .post-table th { padding: 12px 16px; text-align: left; font-size: 0.8rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .post-table td { padding: 14px 16px; border-top: 1px solid #f0f0f0; font-size: 0.9rem; vertical-align: middle; }
    .post-table tbody tr:hover { background: #fafbfc; }

    .post-title a { color: #222; text-decoration: none; font-weight: 500; }
    .post-title a:hover { color: #4a90e2; }

    .empty { text-align: center; padding: 60px 0; color: #aaa; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>게시판</h1>
      <a class="btn-new" href="/posts/new">+ 글쓰기</a>
    </div>

    {% if posts %}
      <table class="post-table">
        <thead>
          <tr>
            <th style="width:60%">제목</th>
            <th>작성자</th>
            <th>작성일</th>
          </tr>
        </thead>
        <tbody>
          {% for post in posts %}
            <tr>
              <td class="post-title"><a href="/posts/{{ post.id }}">{{ post.title }}</a></td>
              <td>{{ post.author_id }}</td>
              <td style="color:#888; white-space:nowrap;">{{ post.created_at[:16] }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    {% else %}
      <div class="empty">아직 작성된 글이 없습니다.</div>
    {% endif %}
  </div>
</body>
</html>
