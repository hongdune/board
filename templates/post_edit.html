<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글 수정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f8; color: #222; }

    .container { max-width: 780px; margin: 48px auto; padding: 0 16px; }

    .back { font-size: 0.85rem; color: #4a90e2; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .back:hover { text-decoration: underline; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 28px; }

    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 32px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .field label { font-size: 0.85rem; font-weight: 600; color: #444; }
    .alert-error {
      background: #fdecea; color: #c0392b; border: 1px solid #f5c6c3;
      border-radius: 6px; padding: 10px 14px; font-size: 0.88rem; margin-bottom: 20px;
    }
    .field input[type="text"],
    .field input[type="password"],
    .field textarea {
      padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.95rem; font-family: inherit; color: #222;
      transition: border-color .15s;
    }
    .field input[type="text"]:focus,
    .field input[type="password"]:focus,
    .field textarea:focus { outline: none; border-color: #4a90e2; }
    .field textarea { resize: vertical; min-height: 180px; line-height: 1.6; }
    .field input[type="file"] { font-size: 0.85rem; color: #555; }
    .field .hint { font-size: 0.78rem; color: #aaa; }

    .current-image { margin-top: 8px; }
    .current-image img { max-width: 200px; border-radius: 6px; display: block; margin-bottom: 6px; }
    .current-image span { font-size: 0.78rem; color: #888; }

    .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .btn { padding: 9px 22px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
    .btn-cancel { background: #f0f2f5; color: #555; }
    .btn-cancel:hover { background: #e4e6ea; }
    .btn-submit { background: #4a90e2; color: #fff; }
    .btn-submit:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/posts/{{ post.id }}">← 상세 페이지로</a>
    <h1>글 수정</h1>

    <div class="card">
      <form method="post" action="/posts/{{ post.id }}/edit" enctype="multipart/form-data">
        {% if error %}
          <div class="alert-error">{{ error }}</div>
        {% endif %}

        <div class="field">
          <label for="password">비밀번호 확인</label>
          <input type="password" id="password" name="password" required placeholder="작성 시 입력한 비밀번호">
        </div>

        <div class="field">
          <label for="title">제목</label>
          <input type="text" id="title" name="title" required maxlength="200" value="{{ post.title }}">
        </div>

        <div class="field">
          <label for="author_id">아이디</label>
          <input type="text" id="author_id" name="author_id" required maxlength="50" value="{{ post.author_id }}">
        </div>

        <div class="field">
          <label for="content">내용</label>
          <textarea id="content" name="content" required maxlength="10000">{{ post.content }}</textarea>
        </div>

        <div class="field">
          <label for="image">이미지 변경 (선택)</label>
          {% if post.image_url %}
            <div class="current-image">
              <img src="{{ post.image_url }}" alt="현재 이미지">
              <span>새 파일을 선택하면 위 이미지가 교체됩니다.</span>
            </div>
          {% endif %}
          <input type="file" id="image" name="image" accept=".jpg,.jpeg,.png,.gif">
          <span class="hint">jpg, jpeg, png, gif 허용</span>
        </div>

        <div class="actions">
          <a class="btn btn-cancel" href="/posts/{{ post.id }}">취소</a>
          <button class="btn btn-submit" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
