<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f8; color: #222; }

    .container { max-width: 780px; margin: 48px auto; padding: 0 16px; }

    .back { font-size: 0.85rem; color: #4a90e2; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .back:hover { text-decoration: underline; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 28px; }

    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 32px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .field label { font-size: 0.85rem; font-weight: 600; color: #444; }
    .field input[type="text"],
    .field input[type="password"],
    .field textarea {
      padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 0.95rem; font-family: inherit; color: #222;
      transition: border-color .15s;
    }
    .field input[type="text"]:focus,
    .field input[type="password"]:focus,
    .field textarea:focus { outline: none; border-color: #4a90e2; }
    .field textarea { resize: vertical; min-height: 180px; line-height: 1.6; }

    .field input[type="file"] { font-size: 0.85rem; color: #555; }
    .field .hint { font-size: 0.78rem; color: #aaa; }

    .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .btn { padding: 9px 22px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; border: none; text-decoration: none; }
    .btn-cancel { background: #f0f2f5; color: #555; }
    .btn-cancel:hover { background: #e4e6ea; }
    .btn-submit { background: #4a90e2; color: #fff; }
    .btn-submit:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/posts">← 목록으로</a>
    <h1>새 글 작성</h1>

    <div class="card">
      <form method="post" action="/posts" enctype="multipart/form-data">
        <div class="field">
          <label for="title">제목</label>
          <input type="text" id="title" name="title" required maxlength="200" placeholder="제목을 입력하세요">
        </div>

        <div class="field">
          <label for="author_id">아이디</label>
          <input type="text" id="author_id" name="author_id" required maxlength="50" placeholder="아이디를 입력하세요">
        </div>

        <div class="field">
          <label for="author_password">비밀번호</label>
          <input type="password" id="author_password" name="author_password" required maxlength="100" placeholder="수정·삭제 시 사용할 비밀번호">
        </div>

        <div class="field">
          <label for="content">내용</label>
          <textarea id="content" name="content" required maxlength="10000" placeholder="내용을 입력하세요"></textarea>
        </div>

        <div class="field">
          <label for="image">이미지 첨부 (선택)</label>
          <input type="file" id="image" name="image" accept=".jpg,.jpeg,.png,.gif">
          <span class="hint">jpg, jpeg, png, gif 허용</span>
        </div>

        <div class="actions">
          <a class="btn btn-cancel" href="/posts">취소</a>
          <button class="btn btn-submit" type="submit">등록</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
